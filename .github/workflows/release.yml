# When package.json "version" changes on main:
# 1) Create GitHub Release + tag vX.Y.Z (gh release create)
# 2) Publish to npm in the same workflow run (Trusted Publishing / OIDC)
#
# Why npm is not a separate "on tag push" workflow: events caused by the default
# GITHUB_TOKEN (including tags/releases created by gh in Actions) do NOT trigger
# other workflows. See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
#
# npm Trusted Publishing: configure workflow filename **release.yml** (not publish.yml).

name: GitHub Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump and create release
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          RELEASED=false

          NEW=$(jq -r '.version // empty' package.json)
          if [ -z "$NEW" ]; then
            echo "No version in package.json"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            OLD=""
          else
            OLD=$(git show "${BEFORE_SHA}:package.json" 2>/dev/null | jq -r '.version // empty' || true)
          fi

          if [ "$NEW" = "$OLD" ]; then
            echo "Version unchanged ($NEW), skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="v${NEW}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Version bump: $OLD -> $NEW, creating $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}"

          RELEASED=true
          echo "released=true" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (no duplicate pin here).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing requires npm ≥11.5.1. Do not `npm install -g npm@…` on
      # GitHub-hosted runners — it can leave a broken global CLI (MODULE_NOT_FOUND:
      # promise-retry). Run a pinned npm via npx instead.
      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm test

      - name: Publish to npm
        run: npx --yes npm@11.12.1 publish --provenance
