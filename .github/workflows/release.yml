# When package.json "version" changes on main, create a GitHub Release + tag vX.Y.Z.
# That tag push triggers publish.yml → npm (Trusted Publishing).
#
# Flow: bump version on main → merge/push → this workflow → tag v0.1.3 → publish.yml → npm

name: GitHub Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create release and tag

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version bump and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          NEW=$(jq -r '.version // empty' package.json)
          if [ -z "$NEW" ]; then
            echo "No version in package.json"
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            OLD=""
          else
            OLD=$(git show "${BEFORE_SHA}:package.json" 2>/dev/null | jq -r '.version // empty' || true)
          fi

          if [ "$NEW" = "$OLD" ]; then
            echo "Version unchanged ($NEW), skipping release."
            exit 0
          fi

          TAG="v${NEW}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          echo "Version bump: $OLD -> $NEW, creating $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}"
